<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Travel Flow · 旅游路线规划</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>

    <header class="topbar glass">
      <div>
        <h1>Travel Flow</h1>
        <p>像苹果官网一样清爽的旅行路线规划器</p>
      </div>
      <button id="newRouteBtn" class="btn primary">+ 新建路线</button>
    </header>

    <main class="layout">
      <aside class="panel glass" id="routePanel">
        <h2>我的路线</h2>
        <div id="routeList" class="route-list"></div>
      </aside>

      <section class="panel glass" id="editorPanel">
        <div class="section-title">
          <h2 id="editorTitle">新路线</h2>
          <div class="toolbar-row">
            <label class="inline-field">
              出行方式
              <select id="travelMode">
                <option value="DRIVING">驾车</option>
                <option value="WALKING">步行</option>
                <option value="TRANSIT">公共交通</option>
                <option value="BICYCLING">骑行</option>
              </select>
            </label>
            <label class="inline-field">
              路线偏好
              <select id="routePreference">
                <option value="BALANCED">平衡</option>
                <option value="LESS_TIME">时间优先</option>
                <option value="LESS_DISTANCE">距离优先</option>
              </select>
            </label>
            <button id="recalcBtn" class="btn">重新计算</button>
          </div>
        </div>

        <div class="form-grid">
          <label>
            路线名称
            <input id="routeName" type="text" placeholder="例如：大阪 5 日吃喝玩乐" />
          </label>
          <label>
            出发地
            <input id="start" type="text" placeholder="例如：上海虹桥站" />
          </label>
          <label>
            目的地
            <input id="end" type="text" placeholder="例如：东京站" />
          </label>
          <label>
            出行日期（可选）
            <input id="travelDate" type="date" />
          </label>
        </div>

        <label>
          路线整体备注
          <textarea id="routeNote" rows="2" placeholder="写下路线整体安排、预算、节奏... "></textarea>
        </label>

        <div id="dayTabs" class="day-tabs top-tabs"></div>

        <div class="waypoint-head">
          <h3>途经点 / 停留点</h3>
          <button id="addWaypointBtn" class="btn">+ 添加途经点</button>
        </div>
        <div id="waypointList" class="waypoint-list"></div>

        <div class="stats" id="statsBox">
          <span>总距离：<strong id="totalDistance">-</strong></span>
          <span>总耗时：<strong id="totalDuration">-</strong></span>
        </div>

        <div class="daily-box">
          <h3>每日在路上时间</h3>
          <div id="dailyStats" class="daily-stats">暂无数据</div>
          <h3>每日行程单</h3>
          <div id="dailyPlan" class="daily-plan">暂无数据</div>
          <h3>每日记账</h3>
          <div id="dailyBudget" class="daily-plan">暂无数据</div>
        </div>

        <details class="ai-box">
          <summary>自驾费用参数（可选）</summary>
          <div class="form-grid">
            <label>油耗（km/L）<input id="kmPerLiter" type="number" min="1" step="0.1" placeholder="12" /></label>
            <label>油价（每升）<input id="fuelPrice" type="number" min="0" step="0.1" placeholder="8.2" /></label>
            <label>租车费（总）<input id="rentalFee" type="number" min="0" step="1" placeholder="1200" /></label>
          </div>
        </details>

        <details class="ai-box">
          <summary>攻略一键解析（LLM）</summary>
          <textarea id="guideInput" rows="4" placeholder="粘贴小红书/微博/公众号攻略文本，支持“D1/D2/Day1”等格式"></textarea>
          <div class="ai-row">
            <input id="aiBaseUrl" type="text" placeholder="可选：OpenAI兼容 Base URL（留空走本地解析）" />
            <input id="aiModel" type="text" placeholder="可选：模型名，如 gpt-4o-mini" />
            <input id="aiApiKey" type="password" placeholder="可选：API Key" />
            <button id="parseGuideBtn" class="btn">解析并填入行程</button>
          </div>
          <p class="hint">不填模型配置时，使用本地规则解析；填了后优先调用大模型抽取天数/地点/计划。</p>
        </details>

        <div class="actions">
          <button id="saveRouteBtn" class="btn primary">保存路线</button>
          <button id="deleteRouteBtn" class="btn danger">删除路线</button>
          <button id="exportBtn" class="btn">导出 JSON</button>
        </div>
      </section>

      <section class="panel glass" id="mapPanel">
        <div class="section-title map-title">
          <h2>地图预览</h2>
          <div class="toolbar-row">
            <label class="inline-field">
              备选路线
              <select id="routeAlternative"></select>
            </label>
          </div>
          <details>
            <summary>Google Maps 设置</summary>
            <label>
              API Key
              <input id="gmapsKey" type="password" placeholder="输入后仅保存在本地浏览器" />
            </label>
            <button id="loadMapBtn" class="btn">加载地图</button>
          </details>
        </div>
        <div id="map" class="map"></div>
        <label class="hint"><input id="mapPickMode" type="checkbox" /> 开启地图点选填经纬度（默认关闭，避免误触）</label>
      </section>
    </main>

    <template id="waypointTpl">
      <article class="waypoint-card" draggable="true">
        <div class="wp-top">
          <span class="drag">⠿</span>
          <h4 class="wp-title">途经点</h4>
          <button class="btn small toggle-waypoint">折叠</button>
          <button class="btn small danger remove-waypoint">删除</button>
        </div>
        <div class="wp-body">
          <div class="form-grid">
            <label>地点名称<input data-f="name" type="text" placeholder="例如：浅草寺" /></label>
            <label>地点地址<input data-f="address" type="text" placeholder="可填地址或地标" /></label>
            <label>纬度<input data-f="lat" type="number" step="any" placeholder="35.7101" /></label>
            <label>经度<input data-f="lng" type="number" step="any" placeholder="139.8107" /></label>
            <label>停留时长（小时）<input data-f="stayHours" type="number" min="0" step="0.5" placeholder="2" /></label>
            <label>行程第几天<input data-f="day" type="number" min="1" step="1" placeholder="1" /></label>
            <label>到此交通方式
              <select data-f="transportFromPrev">
                <option value="DRIVING">驾车</option>
                <option value="WALKING">步行</option>
                <option value="TRANSIT">公共交通</option>
                <option value="BICYCLING">骑行</option>
              </select>
            </label>
            <label>到此路线方案序号
              <input data-f="altFromPrev" type="number" min="0" step="1" placeholder="0" />
            </label>
          </div>
          <label>计划事项<textarea data-f="plan" rows="2" placeholder="景点 / 用餐 / 入住 / 注意事项"></textarea></label>
          <label>备注<textarea data-f="note" rows="2" placeholder="补充说明"></textarea></label>
          <label>上传图片<input data-f="images" type="file" accept="image/*" multiple /></label>
          <div class="img-list"></div>
        </div>
      </article>
    </template>

    <script type="module" src="./app.js"></script>
  </body>
</html>
